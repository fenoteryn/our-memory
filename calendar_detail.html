<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>데이트 기록</title>
<link rel="stylesheet" href="css/style.css">
<script>if(localStorage.getItem('theme')==='dark')document.documentElement.classList.add('dark');</script>
<script type="module" src="js/auth.js"></script>
<script type="module" src="js/theme.js"></script>
</head>
<body>

<header class="top-header">
  <div>
    <p class="page-kicker" id="memoryDateLabel">데이트 기록</p>
    <h1>오늘의 기억</h1>
  </div>
  <a class="text-link" href="calendar.html">캘린더</a>
</header>

<main class="memory-card">
  <label class="field-label" for="title">제목</label>
  <input id="title" placeholder="데이트 제목">

  <section class="route-section" aria-labelledby="routeTitle">
    <div class="route-heading">
      <div>
        <p class="page-kicker">Route</p>
        <h2 id="routeTitle">하루 경로</h2>
      </div>
      <a id="routeMapLink" class="text-link route-map-link" href="https://map.kakao.com" target="_blank" rel="noopener">카카오맵</a>
    </div>

    <div class="category-chips" id="categoryChips" role="group" aria-label="카테고리 선택"></div>

    <div class="route-form">
      <input id="routePlace" placeholder="장소 이름">
      <button type="button" id="addRouteBtn">추가</button>
    </div>

    <ol id="routeList" class="route-list"></ol>
    <p id="routeEmpty" class="route-empty">아직 추가된 경로가 없습니다.</p>
  </section>

  <label class="field-label" for="content">기록</label>
  <textarea id="content" placeholder="오늘의 데이트 기록"></textarea>

  <label class="photo-upload" for="photos">
    사진 추가
    <input type="file" id="photos" multiple accept="image/*" hidden>
  </label>

  <div id="selectedFiles" class="selected-files"></div>
  <div id="photoList" class="photo-list"></div>

  <button id="saveBtn">저장하기</button>
  <p id="formMessage" class="form-message" role="status"></p>
</main>

<nav class="bottom-nav">
  <a href="index.html">홈</a>
  <a class="active" href="calendar.html">캘린더</a>
</nav>

<script type="module" src="js/memory-detail.js"></script>
</body>
</html>
