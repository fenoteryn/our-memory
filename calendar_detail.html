<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>데이트 기록</title>
<link rel="stylesheet" href="css/style.css">
<script type="module" src="js/auth.js"></script>
</head>
<body>

<header class="top-header">
  <div>
    <p class="page-kicker" id="memoryDateLabel">데이트 기록</p>
    <h1>오늘의 기억</h1>
  </div>
  <a class="text-link" href="calendar.html">캘린더</a>
</header>

<main class="memory-card">
  <label class="field-label" for="title">제목</label>
  <input id="title" placeholder="데이트 제목">

  <div class="memory-meta">
    <div>
      <label class="field-label" for="place">장소</label>
      <input id="place" placeholder="함께 간 장소">
    </div>
  </div>

  <label class="field-label">기분</label>
  <input type="hidden" id="rating" value="5">
  <div id="ratingWrap" aria-label="기분 점수">
    <button type="button" class="rating-star active" data-rate="1" aria-label="1점">★</button>
    <button type="button" class="rating-star active" data-rate="2" aria-label="2점">★</button>
    <button type="button" class="rating-star active" data-rate="3" aria-label="3점">★</button>
    <button type="button" class="rating-star active" data-rate="4" aria-label="4점">★</button>
    <button type="button" class="rating-star active" data-rate="5" aria-label="5점">★</button>
  </div>

  <label class="field-label" for="content">기록</label>
  <textarea id="content" placeholder="오늘의 데이트 기록"></textarea>

  <label class="photo-upload" for="photos">
    사진 추가
    <input type="file" id="photos" multiple accept="image/*" hidden>
  </label>

  <div id="selectedFiles" class="selected-files"></div>
  <div id="photoList" class="photo-list"></div>

  <button id="saveBtn">저장하기</button>
  <p id="formMessage" class="form-message" role="status"></p>
</main>

<nav class="bottom-nav">
  <a href="index.html">홈</a>
  <a class="active" href="calendar.html">캘린더</a>
</nav>

<script type="module" src="js/memory-detail.js"></script>
</body>
</html>
