<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>사진 압축 마이그레이션</title>
<link rel="stylesheet" href="css/style.css">
<script>if(localStorage.getItem('theme')==='dark')document.documentElement.classList.add('dark');</script>
<script type="module" src="js/auth.js"></script>
</head>
<body>
<header class="top-header">
  <div>
    <p class="page-kicker">일회용 도구</p>
    <h1>기존 사진 압축</h1>
  </div>
  <a class="text-link" href="index.html">홈</a>
</header>

<main class="memory-card">
  <p style="color:var(--subtext);font-size:14px;margin-bottom:16px">
    기존에 올라간 사진을 모두 최대 1200px / JPEG 82% 품질로 압축합니다.<br>
    완료 후 이 페이지는 삭제해도 됩니다.
  </p>

  <button id="startBtn">압축 시작</button>
  <p id="status" style="margin-top:16px;font-size:14px;color:var(--subtext)"></p>
  <div id="log" style="margin-top:12px;font-size:12px;color:var(--subtext);line-height:1.8;max-height:300px;overflow-y:auto"></div>
</main>

<script type="module">
import { supabase } from './js/supabase.js';

const startBtn = document.getElementById('startBtn');
const statusEl = document.getElementById('status');
const logEl = document.getElementById('log');

function log(msg) {
  logEl.innerHTML += msg + '<br>';
  logEl.scrollTop = logEl.scrollHeight;
}

function compressImage(file, maxPx = 1200, quality = 0.82) {
  return new Promise(resolve => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(url);
      let { width, height } = img;
      if (width > maxPx || height > maxPx) {
        if (width >= height) { height = Math.round(height * maxPx / width); width = maxPx; }
        else { width = Math.round(width * maxPx / height); height = maxPx; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = width; canvas.height = height;
      canvas.getContext('2d').drawImage(img, 0, 0, width, height);
      canvas.toBlob(blob => resolve(new File([blob], file.name, { type: 'image/jpeg' })), 'image/jpeg', quality);
    };
    img.onerror = () => resolve(null);
    img.src = url;
  });
}

startBtn.addEventListener('click', async () => {
  startBtn.disabled = true;
  statusEl.textContent = '사진 목록 불러오는 중...';

  const { data: photos, error } = await supabase.from('photos').select('id,photo_url');
  if (error || !photos?.length) {
    statusEl.textContent = error?.message || '사진이 없습니다.';
    startBtn.disabled = false;
    return;
  }

  const total = photos.length;
  let done = 0, skipped = 0, failed = 0;

  for (const photo of photos) {
    statusEl.textContent = `진행 중... ${done + skipped + failed + 1} / ${total}`;

    try {
      // 1. signed URL 발급
      const { data: urlData, error: urlErr } = await supabase.storage
        .from('photos').createSignedUrl(photo.photo_url, 120);
      if (urlErr || !urlData?.signedUrl) throw new Error(urlErr?.message || 'URL 발급 실패');

      // 2. 다운로드
      const resp = await fetch(urlData.signedUrl);
      if (!resp.ok) throw new Error(`다운로드 실패 (${resp.status})`);
      const blob = await resp.blob();

      // 이미 작은 파일(200KB 미만)은 스킵
      if (blob.size < 200 * 1024) {
        log(`⏭️ 스킵 (이미 작음): ${photo.photo_url.split('/').pop()}`);
        skipped++;
        continue;
      }

      // 3. 압축
      const file = new File([blob], 'photo.jpg', { type: blob.type || 'image/jpeg' });
      const compressed = await compressImage(file);
      if (!compressed) throw new Error('Canvas 압축 실패');

      // 4. 같은 경로에 덮어쓰기
      const { error: upErr } = await supabase.storage
        .from('photos').upload(photo.photo_url, compressed, { upsert: true, cacheControl: '3600' });
      if (upErr) throw new Error(upErr.message);

      const saved = Math.round((1 - compressed.size / blob.size) * 100);
      log(`✅ ${photo.photo_url.split('/').pop()} — ${saved}% 절감`);
      done++;
    } catch (e) {
      log(`❌ 실패: ${photo.photo_url.split('/').pop()} — ${e.message}`);
      failed++;
    }
  }

  statusEl.textContent = `완료! 압축 ${done}개 / 스킵 ${skipped}개 / 실패 ${failed}개`;
  startBtn.textContent = '완료';
});
</script>
</body>
</html>
